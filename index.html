<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lagu yang Disukai</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════════
       ANIMATED BACKGROUND
  ══════════════════════════════════════════════ -->
  <div id="bg-gradient"></div>
  <canvas id="particles-canvas"></canvas>
  <div id="glow-orb"></div>

  <!-- ══════════════════════════════════════════════
       HOME SCREEN
  ══════════════════════════════════════════════ -->
  <div id="screen-home" class="screen active">

    <!-- Header -->
    <header class="home-header">
      <button class="btn-icon" id="btn-back" aria-label="Kembali">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <div class="header-actions">
        <button class="btn-icon" aria-label="Opsi lainnya">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
        </button>
      </div>
    </header>

    <!-- Scrollable content -->
    <div class="home-scroll">

      <!-- Playlist hero -->
      <section class="playlist-hero">
        <div class="playlist-cover-wrap">
          <div class="playlist-cover-grid" id="hero-grid">
            <!-- 4 cover thumbnails generated by JS -->
          </div>
          <div class="playlist-cover-glow"></div>
        </div>
        <div class="playlist-meta">
          <p class="playlist-eyebrow">Playlist</p>
          <h1 class="playlist-title">Lagu yang<br>Disukai</h1>
          <p class="playlist-count" id="playlist-count">0 lagu</p>
        </div>
      </section>

      <!-- Playlist actions bar -->
      <div class="playlist-actions">
        <div class="actions-left">
          <button class="btn-download" aria-label="Unduh playlist">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          </button>
          <button class="btn-icon-sm" aria-label="Opsi">
            <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
          </button>
        </div>
        <div class="actions-right">
          <button class="btn-shuffle-main" id="btn-shuffle-home" aria-label="Acak">
            <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
          </button>
          <button class="btn-play-main" id="btn-play-home" aria-label="Putar">
            <svg id="icon-play-home" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
            <svg id="icon-pause-home" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </button>
        </div>
      </div>

      <!-- Add to playlist button -->
      <button class="btn-add-playlist">
        <span class="add-icon">+</span>
        Tambahkan ke playlist ini
      </button>

      <!-- Song list -->
      <div class="song-list" id="song-list">
        <!-- Generated by JS -->
      </div>

    </div><!-- .home-scroll -->

  </div><!-- #screen-home -->


  <!-- ══════════════════════════════════════════════
       NOW PLAYING SCREEN (Fullscreen)
  ══════════════════════════════════════════════ -->
  <div id="screen-player" class="screen">

    <!-- Dynamic blur background -->
    <div id="player-bg-blur"></div>
    <div id="player-bg-color"></div>

    <!-- Header -->
    <div class="player-header">
      <button class="btn-icon" id="btn-player-down" aria-label="Tutup player">
        <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
      </button>
      <div class="player-header-center">
        <span class="player-context-label">Diputar dari</span>
        <span class="player-context-name">Lagu yang Disukai</span>
      </div>
      <button class="btn-icon" aria-label="Opsi lagu">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
      </button>
    </div>

    <!-- Album Cover -->
    <div class="player-cover-wrap">
      <div class="player-cover-ring"></div>
      <div class="player-cover-container" id="player-cover-container">
        <div class="player-cover-placeholder" id="player-cover-placeholder">
          <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
        </div>
        <img id="player-cover-img" src="" alt="Cover" style="display:none" />
      </div>
      <div class="player-cover-glow" id="player-cover-glow"></div>
    </div>

    <!-- Visualizer (fullscreen) -->
    <div class="player-visualizer-wrap">
      <canvas id="visualizer-full"></canvas>
    </div>

    <!-- Track info + like -->
    <div class="player-track-row">
      <div class="player-track-info">
        <div class="player-track-title" id="player-title">—</div>
        <div class="player-track-artist" id="player-artist">—</div>
      </div>
      <button class="btn-like" id="btn-like" aria-label="Sukai lagu">
        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </button>
    </div>

    <!-- Progress -->
    <div class="player-progress-wrap">
      <div class="progress-bar-track" id="progress-track">
        <div class="progress-bar-fill" id="progress-fill">
          <div class="progress-thumb"></div>
        </div>
      </div>
      <div class="progress-times">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="player-controls">
      <button class="ctrl-btn ctrl-small" id="btn-shuffle" aria-label="Acak">
        <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
      </button>
      <button class="ctrl-btn ctrl-medium" id="btn-prev" aria-label="Sebelumnya">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn ctrl-play" id="btn-play-player" aria-label="Putar/Jeda">
        <svg id="icon-play-player" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
        <svg id="icon-pause-player" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="ctrl-btn ctrl-medium" id="btn-next" aria-label="Berikutnya">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
      <button class="ctrl-btn ctrl-small" id="btn-repeat" aria-label="Ulangi">
        <svg id="icon-repeat-all" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        <svg id="icon-repeat-one" viewBox="0 0 24 24" style="display:none"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z"/></svg>
      </button>
    </div>

    <!-- Volume -->
    <div class="player-volume-row">
      <svg class="vol-icon" viewBox="0 0 24 24"><path d="M18.5 12A4.5 4.5 0 0 0 16 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5zm7-.17v6.34L9.83 13H7v-2h2.83L12 8.83z"/></svg>
      <div class="volume-track" id="volume-track">
        <div class="volume-fill" id="volume-fill"></div>
        <div class="volume-thumb" id="volume-thumb"></div>
      </div>
      <svg class="vol-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </div>

  </div><!-- #screen-player -->


  <!-- ══════════════════════════════════════════════
       MINI PLAYER (fixed, above nav)
  ══════════════════════════════════════════════ -->
  <div id="mini-player" class="hidden">
    <div class="mini-visualizer-wrap">
      <canvas id="visualizer-mini"></canvas>
    </div>
    <div class="mini-cover-wrap" id="mini-cover-wrap" onclick="openPlayer()">
      <div class="mini-cover-placeholder" id="mini-cover-placeholder">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
      </div>
      <img id="mini-cover-img" src="" alt="" style="display:none" />
    </div>
    <div class="mini-info" onclick="openPlayer()">
      <span class="mini-title" id="mini-title">—</span>
      <span class="mini-artist" id="mini-artist">—</span>
    </div>
    <div class="mini-controls">
      <button class="btn-icon mini-ctrl" id="mini-prev" aria-label="Sebelumnya">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="btn-icon mini-ctrl" id="mini-play" aria-label="Putar/Jeda">
        <svg id="icon-play-mini" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
        <svg id="icon-pause-mini" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="btn-icon mini-ctrl" id="mini-next" aria-label="Berikutnya">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
    <!-- Mini progress bar -->
    <div class="mini-progress">
      <div class="mini-progress-fill" id="mini-progress-fill"></div>
    </div>
  </div>


  <!-- ══════════════════════════════════════════════
       BOTTOM NAVIGATION
  ══════════════════════════════════════════════ -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-item active" data-tab="home">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Beranda</span>
    </button>
    <button class="nav-item" data-tab="search">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <span>Cari</span>
    </button>
    <button class="nav-item" data-tab="library">
      <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
      <span>Pustaka</span>
    </button>
    <button class="nav-item" data-tab="premium">
      <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/></svg>
      <span>Premium</span>
    </button>
    <button class="nav-item" data-tab="create">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
      <span>Buat</span>
    </button>
  </nav>

  <!-- Audio element -->
  <audio id="audio" preload="auto"></audio>

  <script src="script.js"></script>
</body>
</html>
